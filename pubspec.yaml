name: expense_tracker
description: A minimal Expense & Income Tracker scaffold (Flutter + Firebase)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.8.0
  firebase_auth: ^4.4.0
  cloud_firestore: ^4.4.0
  flutter_riverpod: ^2.2.0
  fl_chart: ^0.55.0
  intl: ^0.18.0
  connectivity_plus: ^4.0.1
  path_provider: ^2.0.14
  shared_preferences: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
