name: expense_tracker
description: A minimal Expense & Income Tracker scaffold (Flutter + Firebase)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  flutter_riverpod: ^2.5.0
  fl_chart: ^0.68.0
  intl: ^0.18.0
  connectivity_plus: ^4.0.1
  path_provider: ^2.0.14
  shared_preferences: ^2.1.1
  http: ^0.13.6
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
